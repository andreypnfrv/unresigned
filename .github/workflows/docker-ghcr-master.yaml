# Builds the root Dockerfile and pushes to GHCR with free GitHub Actions cache (cache-from/to type=gha).
# Railway can deploy from this image (configure service → deploy from registry) to skip rebuilding on Railway.
# Costs: public repo — GHA minutes + GHCR within free tiers; uses secrets.GITHUB_TOKEN (no extra PAT).
name: Docker image to GHCR
on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - id: image
        run: echo "tag=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]'):latest" >> "$GITHUB_OUTPUT"

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.image.outputs.tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
